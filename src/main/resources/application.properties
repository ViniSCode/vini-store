spring.application.name=vinistore

# Configuração do banco de dados em memória H2
spring.datasource.url=jdbc:h2:mem:vinidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar o console do H2 para verificar tabelas se necessário (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

